---
kind: PersistentVolumeClaim
apiVersion: v1
metadata:
  name: spierscraper-cache
spec:
  storageClassName: local-path
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 500Mi
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: spierscraper
  namespace: default
spec:
  schedule: "5 4 * * *" # At 4:05
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: spierscraper
              image: ghcr.io/ianepreston/spierscraper:latest
              args: ["--config", "/config/config.yaml"]
              env:
                - name: DISCORD_WEBHOOK_URL
                  valueFrom:
                    secretKeyRef:
                      name: spierscraper-secret
                      key: DISCORD_WEBHOOK_URL
              volumeMounts:
                - name: config
                  mountPath: /config
                  readOnly: true
                - name: cache
                  mountPath: /data/cache
              resources:
                requests:
                  memory: "64Mi"
                  cpu: "50m"
                limits:
                  memory: "128Mi"
                  cpu: "200m"
          volumes:
            - name: config
              configMap:
                name: spierscraper-config
            - name: cache
              persistentVolumeClaim:
                claimName: spierscraper-cache
