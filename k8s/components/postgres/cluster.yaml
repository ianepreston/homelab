---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/postgresql.cnpg.io/cluster_v1.json
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: ${APP}-cnpg-db
  namespace: ${APP}
spec:
  description: Postgres cluster for ${APP}
  imageCatalogRef:
    kind: ClusterImageCatalog
    apiGroup: postgresql.cnpg.io
    name: standard-postgres-catalog
    major: ${PG_MAJOR}
  resources:
    requests:
      memory: "512Mi"
      cpu: "500m"
    limits:
      memory: "1Gi"
      cpu: "1"
  monitoring:
    enablePodMonitor: false
  instances: 2
  storage:
    size: ${DB_STORAGE:=5Gi}
    storageClass: longhorn-cnpg-strict-local
  backup:
    retentionPolicy: "${RETENTION_POLICY:=90d}"
    barmanObjectStore:
      wal:
        compression: snappy # continuous, runs on primary - minimize CPU overhead
      data:
        compression: gzip # weekly, runs on replica - higher compression is worth more cpu
      destinationPath: "s3://${CNPG_BACKUP_BUCKET}/${APP}-cnpg-db"
      endpointURL: "https://s3.laconia.ipreston.net"
      s3Credentials:
        accessKeyId:
          key: ACCESS_KEY_ID
          name: cnpg-backup-creds
        secretAccessKey:
          key: SECRET_ACCESS_KEY
          name: cnpg-backup-creds
  bootstrap:
    initdb:
      database: ${APP}
      owner: ${APP}
